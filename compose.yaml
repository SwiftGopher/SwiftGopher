services:
  backend:
    build:
      context: backend
      dockerfile: docker/Dockerfile.dev
    container_name: backend
    ports:
      - "8081:8080"
    volumes:
      - ./backend:/app
      - /app/tmp
    env_file:
      - .env.example
    depends_on:
      db:
        condition: service_healthy
  
  db:
    image: postgres:17.9-alpine3.23
    container_name: db
    ports:
      - "5433:5432"
    env_file:
      - .env.example
    volumes:
      - pgtestdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 10s
      retries: 5
      timeout: 10s
      start_period: 30s

volumes:
  pgtestdata: